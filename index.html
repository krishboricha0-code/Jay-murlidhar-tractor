<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>જય મુરલીધર ટ્રેક્ટર - ગઢડા</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf2e9; padding: 15px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 10px solid #e65100; }
        h1 { color: #e65100; text-align: center; font-size: 24px; margin-bottom: 20px; text-shadow: 1px 1px 2px #ccc; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ffccbc; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #e65100; }
        .btn { background: #e65100; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚩 જય મુરલીધર ટ્રેક્ટર - ગઢડા</h1>
        <div class="input-group">
            <label>ખેડૂતનું નામ:</label>
            <input type="text" id="name" placeholder="નામ લખો">
        </div>
        <div class="input-group">
            <label>કામનો પ્રકાર:</label>
            <select id="work">
                <option value="500">રોટાવેટર</option>
                <option value="400">વાવેતર</option>
                <option value="300">સવડુ</option>
            </select>
        </div>
        <div class="input-group">
            <label>વીઘા / કલાક:</label>
            <input type="number" id="units" placeholder="સંખ્યા લખો">
        </div>
        <button class="btn" onclick="alert('ગણતરી થઈ રહી છે...')">હિસાબ કરો</button>
    </div>
</body>
</html>
